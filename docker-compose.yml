version: "3.9"

services:
  test:
    image: python:3.14
    working_dir: /workspace
    volumes:
      - .:/workspace
    env_file:
      - .env
    command: >
      bash -lc "
      python -m pip install --upgrade pip &&
      pip install -r requirements.txt &&
      pip install -e . &&
      pytest
      "
