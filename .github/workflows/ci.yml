name: CI

on:
  push:
    paths-ignore:
      - "badges/coverage.json"
  pull_request:

permissions:
  contents: write

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build
          pip install -e .

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Build package
        run: python -m build

      - name: Build documentation site
        run: |
          python scripts/build_docs.py
          python -m mkdocs build --strict

      - name: Run unit tests with coverage
        run: |
          pytest -m "not integration" --cov=zoom_sdk --cov-report=term --cov-report=xml

      - name: Write coverage badge payload
        if: github.event_name == 'push'
        run: |
          python scripts/write_coverage_badge.py \
            --input coverage.xml \
            --output badges/coverage.json \
            --label "coverage (${{ github.ref_name }})"

      - name: Commit updated coverage badge
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- badges/coverage.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          git commit -m "ci: update branch coverage badge [skip ci]"
          git push

  integration:
    runs-on: ubuntu-latest
    needs: unit
    if: |
      (github.event_name == 'push' &&
        (github.ref_name == 'staging' || github.ref_name == 'main')) ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'staging' || github.base_ref == 'main'))
    env:
      ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
      ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
      ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
      ZOOM_BASE_URL: ${{ secrets.ZOOM_BASE_URL }}
      ZOOM_OAUTH_URL: ${{ secrets.ZOOM_OAUTH_URL }}
      ZOOM_TOKEN_SKEW_SECONDS: ${{ secrets.ZOOM_TOKEN_SKEW_SECONDS }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        run: pytest -m integration
